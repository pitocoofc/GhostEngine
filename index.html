<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #0a0a0a; color: #fff; margin: 0; font-family: monospace; display: flex; flex-direction: column; height: 100vh; }
        .editor-container { display: grid; grid-template-columns: 1fr 1fr; flex-grow: 1; border-top: 1px solid #222; }
        textarea { background: #000; color: #3b82f6; border: none; padding: 10px; resize: none; border-right: 1px solid #222; }
        #preview { background: #fff; border: none; width: 100%; height: 100%; }
        .toolbar { padding: 10px; background: #111; display: flex; gap: 10px; }
        button { background: #3b82f6; color: #fff; border: none; padding: 5px 15px; cursor: pointer; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="toolbar">
        <button onclick="runCode()">RODAR [▶]</button>
        <span style="font-size: 12px; color: #555;">GHOST_IDE_V1.0</span>
    </div>
    
    <div class="editor-container">
        <div style="display: flex; flex-direction: column;">
            <textarea id="htmlCode" placeholder="HTML aqui..."><h1>Hello World</h1></textarea>
            <textarea id="cssCode" placeholder="CSS aqui...">h1 { color: blue; }</textarea>
            <textarea id="jsCode" placeholder="JS aqui...">console.log('GhostIDE rodando...');</textarea>
        </div>
        <iframe id="preview"></iframe>
    </div>

    <script src="compiler.js"></script>
</body>
</html>
